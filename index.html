<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Storage Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📁 File Storage Manager</h1>
            <button onclick="goToRoot()" class="breadcrumb-btn">Home</button>
        </header>

        <div id="uploadArea" class="upload-area">
            <div class="upload-content">
                <p>📤 Click to upload or drag files here</p>
                <small>Files are stored in your browser's local storage</small>
            </div>
            <input type="file" id="fileInput" multiple hidden>
        </div>

        <div id="filesGrid" class="files-grid">
            <!-- Files will be rendered here -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
